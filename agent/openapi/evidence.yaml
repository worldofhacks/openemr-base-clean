openapi: 3.0.3
info:
  title: Clinical Co-Pilot evidence-search fragment
  version: 0.1.0
  description: >-
    Mergeable OpenAPI fragment for the retrieval-lane POST /evidence/search route.
    Traceability: W2-D4, W2-R3, and W2_ARCHITECTURE §2/§4/§5.
x-merge-note: >-
  This fragment intentionally owns only /evidence/search and its component schemas;
  merge it into the app-wide specification without replacing unrelated paths.
paths:
  /evidence/search:
    post:
      operationId: searchEvidence
      summary: Search the version-pinned VA/DoD guideline corpus
      description: >-
        Accepts PHI-free condition and test terms only. Terms may be separated by a
        comma, semicolon, or vertical bar. A healthy miss returns an empty items array.
        If a configured reranker is unavailable, retrieval falls back behind the
        RERANKER seam and returns this same typed envelope; degradation is recorded
        internally and does not add an undocumented public field.
      tags:
        - evidence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvidenceSearchRequest"
            example:
              query: type 2 diabetes; HbA1c
              k: 5
      responses:
        "200":
          description: >-
            Version-bound evidence snippets. The reranker-down path intentionally uses
            the identical EvidenceSearchResponse schema.
          headers:
            x-copilot-request-id:
              description: Request correlation identifier; matches correlation_id.
              schema:
                type: string
                minLength: 1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceSearchResponse"
              examples:
                reranked:
                  summary: Successful hybrid retrieval and rerank
                  value:
                    items:
                      - source_id: vadod-diabetes-2023@d80c45f784072b051e542785aadaea851b8564c60123fa0bb1365e750d391fb7
                        section: "Recommendations: Summary"
                        chunk_id: vadod-diabetes-2023:p0025:c002:355ee100856b
                        quote: >-
                          We suggest setting an individualized HbA1c target range based
                          on the clinician's appraisal of the risk benefit ratio.
                        score: 0.94
                        corpus_version: vadod-cpg-trio@d80c45f784072b051e542785aadaea851b8564c60123fa0bb1365e750d391fb7
                    corpus_version: vadod-cpg-trio@d80c45f784072b051e542785aadaea851b8564c60123fa0bb1365e750d391fb7
                    correlation_id: req-evidence-example-001
                rerankerDown:
                  summary: Reranker unavailable; hybrid/local fallback remains usable
                  description: >-
                    Public shape stays stable. Runtime telemetry, not this clinical
                    response, records the degraded reranker path.
                  value:
                    items:
                      - source_id: vadod-diabetes-2023@d80c45f784072b051e542785aadaea851b8564c60123fa0bb1365e750d391fb7
                        section: "Recommendations: Summary"
                        chunk_id: vadod-diabetes-2023:p0025:c002:355ee100856b
                        quote: >-
                          We suggest setting an individualized HbA1c target range based
                          on the clinician's appraisal of the risk benefit ratio.
                        score: 0.78
                        corpus_version: vadod-cpg-trio@d80c45f784072b051e542785aadaea851b8564c60123fa0bb1365e750d391fb7
                    corpus_version: vadod-cpg-trio@d80c45f784072b051e542785aadaea851b8564c60123fa0bb1365e750d391fb7
                    correlation_id: req-evidence-degraded-001
        "422":
          description: Request validation failed or the query violated the PHI-free term contract.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/HTTPValidationError"
                  - $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: The corpus index or retrieval runtime is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                detail: guideline retrieval unavailable
components:
  schemas:
    EvidenceSearchRequest:
      type: object
      additionalProperties: false
      required:
        - query
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 180
          description: PHI-free condition/test terms; surrounding whitespace is stripped.
        k:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
    EvidenceSnippet:
      type: object
      additionalProperties: false
      required:
        - source_id
        - section
        - chunk_id
        - quote
        - score
        - corpus_version
      properties:
        source_id:
          type: string
          minLength: 1
          pattern: "^.*@[0-9a-f]{64}$"
          description: Source document ID suffixed with the response manifest hash.
        section:
          type: string
          minLength: 1
        chunk_id:
          type: string
          minLength: 1
        quote:
          type: string
          minLength: 1
        score:
          type: number
          format: double
          minimum: 0
          maximum: 1
        corpus_version:
          type: string
          minLength: 1
          pattern: "^.*@[0-9a-f]{64}$"
    EvidenceSearchResponse:
      type: object
      additionalProperties: false
      required:
        - items
        - corpus_version
        - correlation_id
      properties:
        items:
          type: array
          maxItems: 10
          description: >-
            Snippets have unique chunk_id values and must share this response's corpus
            version and manifest hash.
          items:
            $ref: "#/components/schemas/EvidenceSnippet"
        corpus_version:
          type: string
          minLength: 1
          pattern: "^.*@[0-9a-f]{64}$"
        correlation_id:
          type: string
          minLength: 1
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - detail
      properties:
        detail:
          type: string
    HTTPValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"
    ValidationError:
      type: object
      required:
        - loc
        - msg
        - type
      properties:
        loc:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
        msg:
          type: string
        type:
          type: string
