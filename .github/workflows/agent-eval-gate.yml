name: agent-eval-gate

on:
  push:
    branches:
      - main
      - 'tier2/**'
  pull_request:
  workflow_dispatch:
    inputs:
      exact_sha:
        description: Exact reviewed 40-character commit SHA
        required: true

permissions:
  actions: read
  checks: read
  contents: read

concurrency:
  group: w2-eval-${{ github.event.pull_request.head.sha || inputs.exact_sha || github.sha }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality-security-contracts
    uses: ./.github/workflows/agent-quality.yml

  eval-tier1:
    name: eval-tier1
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.exact_sha || github.sha }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: agent/pyproject.toml
      - name: Install OCR runtime and agent
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-eng
          python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Full offline 50-case gate
        env:
          SOURCE_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.exact_sha || github.event.pull_request.head.sha || github.sha }}
          RUN_LIVE: '0'
          W2_EVAL_NETWORK: disabled
          RERANKER: local
          COHERE_API_KEY: ''
        run: python -m evals.w2_runner run --tier recorded
      - name: Scan aggregate result and recording metadata
        if: always()
        run: >-
          python -m evals.artifact_scan
          --eval-result evals/results-tier1.json evals/recordings
      - name: Existing regression suite
        env:
          RUN_LIVE: '0'
        run: python -m pytest tests evals ops bruno corpus --tb=no --show-capture=no -q
      - name: Upload aggregate-only Tier-1 result
        id: tier1-artifact
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: eval-results-tier1
          path: agent/evals/results-tier1.json
          if-no-files-found: error
          retention-days: 14

  eval-tier2-live:
    name: eval-tier2-live
    needs: [quality, eval-tier1]
    if: >-
      github.repository == 'worldofhacks/openemr-base-clean' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' &&
         (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/tier2/')))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: eval-tier2-live
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.exact_sha || github.event.pull_request.head.sha || github.sha }}
      - name: Verify exact trusted SHA/branch binding
        shell: bash
        env:
          REQUESTED_SHA: ${{ inputs.exact_sha }}
        run: |
          actual="$(git rev-parse HEAD)"
          case "$actual" in
            *[!0-9a-f]*|'') exit 1 ;;
          esac
          test "${#actual}" -eq 40
          if [[ "${GITHUB_REF}" == refs/heads/tier2/* ]]; then
            expected="${GITHUB_REF#refs/heads/tier2/}"
            test "$expected" = "$actual"
          fi
          if [[ "${GITHUB_EVENT_NAME}" == workflow_dispatch ]]; then
            test "$REQUESTED_SHA" = "$actual"
          fi
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: agent/pyproject.toml
      - name: Install OCR runtime and agent
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-eng
          python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Reuse the exact-SHA green full-live result on main
        id: reuse-live
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVALUATED_SHA: ${{ github.sha }}
        run: >-
          python ../.github/scripts/reuse_live_eval.py
          --sha "$EVALUATED_SHA"
          --output "$RUNNER_TEMP/results-tier2.json"
      - name: Require protected provider key
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: test -n "$ANTHROPIC_API_KEY"
      - name: Full live 50-case gate
        id: live-gate
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        continue-on-error: true
        env:
          SOURCE_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.exact_sha || github.event.pull_request.head.sha || github.sha }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_LIVE: '1'
          RERANKER: local
          COHERE_API_KEY: ''
        run: >-
          python -m evals.w2_runner run --tier live
          --output "$RUNNER_TEMP/results-tier2.json"
      - name: Scan aggregate-only live result
        id: live-scan
        if: always()
        run: >-
          python -m evals.artifact_scan
          --eval-result "$RUNNER_TEMP/results-tier2.json"
      - name: Upload aggregate-only Tier-2 result
        id: tier2-artifact
        if: always() && steps.live-scan.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: eval-results-tier2-live
          path: ${{ runner.temp }}/results-tier2.json
          if-no-files-found: error
          retention-days: 14
      - name: Enforce live gate, scan, and retention outcomes
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
          LIVE_OUTCOME: ${{ steps.live-gate.outcome }}
          REUSED: ${{ steps.reuse-live.outputs.reuse }}
          REUSE_OUTCOME: ${{ steps.reuse-live.outcome }}
          SCAN_OUTCOME: ${{ steps.live-scan.outcome }}
          UPLOAD_OUTCOME: ${{ steps.tier2-artifact.outcome }}
        run: |
          test "$SCAN_OUTCOME" = success
          test "$UPLOAD_OUTCOME" = success
          if [[ "$EVENT_NAME" == push && "$GIT_REF" == refs/heads/main ]]; then
            test "$REUSE_OUTCOME" = success
            test "$REUSED" = true
            test "$LIVE_OUTCOME" = skipped
          else
            test "$REUSE_OUTCOME" = skipped
            test "$LIVE_OUTCOME" = success
          fi
