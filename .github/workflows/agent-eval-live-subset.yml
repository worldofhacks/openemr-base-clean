name: agent-eval-live-subset

on:
  push:
    branches:
      - 'tier2-subset/**'

permissions:
  contents: read

concurrency:
  group: w2-live-subset-${{ github.sha }}
  cancel-in-progress: true

jobs:
  diagnostic-live-subset:
    name: diagnostic-live-subset
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: eval-tier2-live
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
      - name: Verify exact diagnostic SHA
        shell: bash
        run: |
          actual="$(git rev-parse HEAD)"
          expected="${GITHUB_REF#refs/heads/tier2-subset/}"
          case "$expected" in *[!0-9a-f]*|'') exit 1 ;; esac
          test "${#expected}" -eq 40
          test "$expected" = "$GITHUB_SHA"
          test "$expected" = "$actual"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: agent/pyproject.toml
      - name: Install OCR runtime and agent
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-eng
          python -m pip install --disable-pip-version-check -e '.[dev]'
      - name: Require protected provider key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: test -n "$ANTHROPIC_API_KEY"
      - name: Run diagnostic live subset
        id: live-subset
        continue-on-error: true
        shell: bash
        env:
          SOURCE_SHA: ${{ github.sha }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_LIVE: '1'
          RERANKER: local
          COHERE_API_KEY: ''
        run: |
          set -euo pipefail
          mapfile -t selected < evals/citation-regression-candidates.txt
          test "${#selected[@]}" -ge 1
          test "${#selected[@]}" -le 20
          args=()
          for case_id in "${selected[@]}"; do
            [[ "$case_id" =~ ^[a-z0-9][a-z0-9._-]*$ ]]
            args+=(--case-id "$case_id")
          done
          python -m evals.w2_runner diagnose-live \
            "${args[@]}" \
            --max-cost-usd 5 \
            --max-seconds 1200 \
            --output "$RUNNER_TEMP/results-live-subset.json"
      - name: Scan diagnostic aggregate
        id: subset-scan
        if: always()
        run: >-
          python -m evals.artifact_scan
          --eval-result "$RUNNER_TEMP/results-live-subset.json"
      - name: Retain sanitized diagnostic result
        id: subset-artifact
        if: always() && steps.subset-scan.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: eval-results-tier2-live-subset
          path: ${{ runner.temp }}/results-live-subset.json
          if-no-files-found: error
          retention-days: 7
      - name: Enforce diagnostic, scan, and retention outcomes
        if: always()
        env:
          LIVE_OUTCOME: ${{ steps.live-subset.outcome }}
          SCAN_OUTCOME: ${{ steps.subset-scan.outcome }}
          UPLOAD_OUTCOME: ${{ steps.subset-artifact.outcome }}
        run: |
          test "$SCAN_OUTCOME" = success
          test "$UPLOAD_OUTCOME" = success
          test "$LIVE_OUTCOME" = success
