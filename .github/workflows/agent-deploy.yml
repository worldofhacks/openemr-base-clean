name: agent-deploy

on:
  workflow_run:
    workflows: [agent-eval-gate]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: w2-production-deploy
  cancel-in-progress: false

jobs:
  deploy-exact-evaluated-sha:
    name: deploy-exact-evaluated-sha
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Verify evaluated source identity
        env:
          EVALUATED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: test "$(git rev-parse HEAD)" = "$EVALUATED_SHA"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
      - name: Install locked Railway CLI without deployment credentials
        run: |
          npm ci --ignore-scripts --prefix .github/railway-cli
          test "$(node -p "require('./.github/railway-cli/node_modules/@railway/cli/package.json').version")" = "5.26.1"
          test "$(node -p "require('./.github/railway-cli/node_modules/tar/package.json').version")" = "7.5.20"
          cli_dir=.github/railway-cli/node_modules/@railway/cli/bin
          archive="$RUNNER_TEMP/railway-v5.26.1-x86_64-unknown-linux-gnu.tar.gz"
          test -d "$cli_dir"
          test ! -e "$cli_dir/railway"
          curl --proto '=https' --tlsv1.2 --fail --show-error --silent --location --retry 3 \
            'https://github.com/railwayapp/cli/releases/download/v5.26.1/railway-v5.26.1-x86_64-unknown-linux-gnu.tar.gz' \
            --output "$archive"
          printf '%s  %s\n' '7ab32701c4da05eafd0e2a956b441bea581d61def9a0689d9c35d2759e6f3640' "$archive" | sha256sum -c -
          test "$(tar -tzf "$archive")" = "railway"
          tar -xzf "$archive" -C "$cli_dir" railway
          test -f "$cli_dir/railway"
          test -x "$cli_dir/railway"
          test ! -L "$cli_dir/railway"
          test "$(.github/railway-cli/node_modules/.bin/railway --version)" = "railway 5.26.1"
          npm audit --audit-level=high --prefix .github/railway-cli
      - name: Configure exact source identity for both services
        working-directory: agent
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          EVALUATED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          test -n "$RAILWAY_TOKEN"
          railway="../.github/railway-cli/node_modules/.bin/railway"
          "$railway" variables --service agent --set "DEPLOYMENT_SHA=$EVALUATED_SHA" --skip-deploys
          "$railway" variables --service document-worker --set "DEPLOYMENT_SHA=$EVALUATED_SHA" --skip-deploys
      - name: Deploy worker from an exact-SHA worker context
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          EVALUATED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          test -n "$RAILWAY_TOKEN"
          worker_context="$RUNNER_TEMP/document-worker-context"
          mkdir -p "$worker_context"
          git archive "$EVALUATED_SHA" agent | tar -x -C "$worker_context" --strip-components=1
          cp "$worker_context/railway.worker.json" "$worker_context/railway.json"
          test "$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["deploy"]["startCommand"])' "$worker_context/railway.json")" = "python -m app.ingestion.worker"
          railway="$GITHUB_WORKSPACE/.github/railway-cli/node_modules/.bin/railway"
          cd "$worker_context"
          "$railway" up --service document-worker --ci
      - name: Deploy web from the evaluated SHA
        working-directory: agent
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          test -n "$RAILWAY_TOKEN"
          railway="../.github/railway-cli/node_modules/.bin/railway"
          "$railway" up --service agent --ci --detach
      - name: Verify deployed SHA, health, readiness, and synthetic smoke
        env:
          EVALUATED_SHA: ${{ github.event.workflow_run.head_sha }}
          AGENT_BASE_URL: ${{ vars.AGENT_BASE_URL }}
        run: |
          test -n "$AGENT_BASE_URL"
          python agent/scripts/verify_deployed_sha.py \
            --base-url "$AGENT_BASE_URL" \
            --sha "$EVALUATED_SHA" \
            --timeout-seconds 600
