[project]
name = "clinical-copilot-agent"
version = "0.1.0"
description = "Clinical Co-Pilot — SMART-on-FHIR sidecar agent for OpenEMR (ARCHITECTURE.md §2)"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "pydantic>=2.9",
    "pydantic-settings>=2.5",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = ["error::DeprecationWarning"]

[tool.setuptools.packages.find]
include = ["app*"]
